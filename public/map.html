<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Risk Map — Delhi's HeatShield</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:       #ede9e3;
  --surface:  #f5f2ee;
  --white:    #ffffff;
  --border:   #ddd8d0;
  --border2:  #e8e3dc;
  --text:     #1a1a1a;
  --muted:    #6b6560;
  --muted2:   #9b948c;
  --accent:   #c1440e;
  --accent2:  #d4561a;
  --accent-bg:#fdf1ec;
  --accent-border:#e8c4b4;
  --panel-w:  300px;
  --nav-h:    52px;
}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* ── NAV ── */
nav{
  flex-shrink:0;
  height:var(--nav-h);
  background:var(--white);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  padding:0 24px;
  gap:0;
  z-index:1000;
}
.nav-brand{
  font-size:15px;
  font-weight:700;
  color:var(--text);
  margin-right:40px;
  white-space:nowrap;
  flex-shrink:0;
}
.nav-brand span{ color:var(--accent); }
.nav-links{
  display:flex;
  align-items:center;
  gap:2px;
  flex:1;
}
.nav-link{
  padding:6px 14px;
  font-size:13px;
  font-weight:500;
  color:var(--muted);
  border-radius:6px;
  cursor:pointer;
  transition:all .15s;
  border:none;
  background:none;
  font-family:'Inter',sans-serif;
  text-decoration:none;
}
.nav-link:hover{color:var(--text);background:var(--bg);}
.nav-link.active{color:var(--text);background:var(--bg); font-weight:600;}
.nav-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.btn-login{
  padding:7px 16px;font-size:13px;font-weight:500;
  border:1px solid var(--border);border-radius:7px;
  background:transparent;color:var(--text);cursor:pointer;
  font-family:'Inter',sans-serif;transition:all .15s;
}
.btn-login:hover{background:var(--bg);}
.btn-signup{
  padding:7px 16px;font-size:13px;font-weight:600;
  border:none;border-radius:7px;
  background:var(--accent);color:#fff;cursor:pointer;
  font-family:'Inter',sans-serif;transition:background .15s;
}
.btn-signup:hover{background:var(--accent2);}

/* ── BODY ── */
.body{flex:1;display:flex;overflow:hidden;}

/* ── LEFT PANEL ── */
.panel{
  width:var(--panel-w);
  flex-shrink:0;
  background:var(--white);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* panel top bar */
.panel-topbar{
  padding:14px 16px 12px;
  border-bottom:1px solid var(--border2);
  flex-shrink:0;
}
.panel-title{
  font-size:13px;font-weight:700;color:var(--text);
  display:flex;align-items:center;gap:7px;margin-bottom:10px;
}
.live-dot{
  width:7px;height:7px;border-radius:50%;background:var(--accent);
  animation:pulse 2s ease-in-out infinite;flex-shrink:0;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.85)}}

/* search */
.search-wrap{position:relative;}
.search-input{
  width:100%;
  padding:8px 10px 8px 32px;
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:7px;
  color:var(--text);
  font-size:12px;
  font-family:'Inter',sans-serif;
  outline:none;
  transition:border-color .15s;
}
.search-input:focus{border-color:var(--accent);background:var(--white);}
.search-input::placeholder{color:var(--muted2);}
.search-icon{
  position:absolute;left:10px;top:50%;transform:translateY(-50%);
  color:var(--muted2);font-size:13px;pointer-events:none;
}

/* filter chips */
.filter-section{
  padding:10px 16px;
  border-bottom:1px solid var(--border2);
  flex-shrink:0;
}
.filter-label{
  font-size:10px;font-weight:600;text-transform:uppercase;
  letter-spacing:.8px;color:var(--muted2);margin-bottom:7px;
}
.chips{display:flex;gap:5px;flex-wrap:wrap;}
.chip{
  padding:4px 10px;
  border-radius:20px;
  border:1px solid var(--border);
  background:transparent;
  color:var(--muted);
  font-size:11px;font-weight:500;
  cursor:pointer;
  font-family:'Inter',sans-serif;
  transition:all .15s;
}
.chip.active{
  border-color:var(--accent);
  color:var(--accent);
  background:var(--accent-bg);
}
.chip:hover:not(.active){border-color:#bbb;color:var(--text);}

/* legend */
.legend-section{
  padding:10px 16px;
  border-bottom:1px solid var(--border2);
  flex-shrink:0;
}
.legend-label{
  font-size:10px;font-weight:600;text-transform:uppercase;
  letter-spacing:.8px;color:var(--muted2);margin-bottom:7px;
}
.legend-bar{
  height:7px;border-radius:4px;
  background:linear-gradient(to right,#2ecc71,#f1c40f,#e67e22,#e74c3c,#8e44ad);
  margin-bottom:5px;
}
.legend-ticks{
  display:flex;justify-content:space-between;
  font-size:10px;color:var(--muted2);font-weight:500;
}

/* locality list */
.loc-list{flex:1;overflow-y:auto;}
.loc-list::-webkit-scrollbar{width:4px;}
.loc-list::-webkit-scrollbar-track{background:transparent;}
.loc-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

.loc-group-header{
  padding:8px 16px 4px;
  font-size:9px;font-weight:700;
  text-transform:uppercase;letter-spacing:1px;
  color:var(--muted2);
  background:var(--surface);
  border-bottom:1px solid var(--border2);
  position:sticky;top:0;
}
.loc-item{
  display:flex;align-items:center;gap:9px;
  padding:9px 16px;
  cursor:pointer;
  border-bottom:1px solid var(--border2);
  border-left:3px solid transparent;
  transition:all .12s;
  background:var(--white);
}
.loc-item:hover{background:var(--surface);border-left-color:var(--border);}
.loc-item.sel{background:var(--accent-bg);border-left-color:var(--accent);}
.loc-rank{font-size:10px;color:var(--muted2);width:18px;text-align:right;flex-shrink:0;font-weight:600;}
.loc-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;border:1.5px solid rgba(0,0,0,.12);}
.loc-info{flex:1;overflow:hidden;}
.loc-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);}
.loc-dist{font-size:10px;color:var(--muted2);margin-top:1px;}
.loc-hvi{font-size:11px;font-weight:700;flex-shrink:0;}

/* panel footer */
.panel-footer{
  flex-shrink:0;
  padding:9px 16px;
  border-top:1px solid var(--border2);
  display:flex;align-items:center;justify-content:space-between;
  font-size:10px;color:var(--muted2);
  background:var(--surface);
}
#srv-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#22c55e;margin-right:5px;vertical-align:middle;}
.refresh-small{
  padding:4px 10px;font-size:10px;font-weight:600;
  border:1px solid var(--accent-border);border-radius:5px;
  background:var(--accent-bg);color:var(--accent);
  cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;
}
.refresh-small:hover{background:#fbe6de;}

/* ── MAP ── */
.map-wrap{flex:1;position:relative;}
#map{position:absolute;inset:0;}

/* map top controls */
.map-controls{
  position:absolute;top:12px;left:12px;z-index:500;
  display:flex;gap:6px;
}
.map-ctrl-btn{
  padding:6px 14px;
  font-size:11px;font-weight:600;
  border:1px solid var(--border);
  border-radius:7px;
  background:var(--white);
  color:var(--muted);
  cursor:pointer;
  font-family:'Inter',sans-serif;
  transition:all .15s;
  box-shadow:0 1px 4px rgba(0,0,0,.08);
}
.map-ctrl-btn:hover{color:var(--text);}
.map-ctrl-btn.active{
  background:var(--white);
  color:var(--accent);
  border-color:var(--accent-border);
}

/* info pill top-center */
.map-info-pill{
  position:absolute;top:12px;left:50%;transform:translateX(-50%);
  z-index:500;
  background:var(--white);
  border:1px solid var(--border);
  border-radius:20px;
  padding:6px 16px;
  font-size:12px;font-weight:500;
  color:var(--muted);
  display:flex;align-items:center;gap:7px;
  box-shadow:0 1px 4px rgba(0,0,0,.08);
  white-space:nowrap;
}
.pill-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pulse 2s ease-in-out infinite;}

/* stats strip bottom of map */
.map-stats{
  position:absolute;bottom:12px;left:12px;right:12px;
  z-index:500;
  display:flex;gap:8px;
  pointer-events:none;
}
.map-stat-card{
  background:var(--white);
  border:1px solid var(--border);
  border-radius:9px;
  padding:9px 14px;
  box-shadow:0 1px 4px rgba(0,0,0,.08);
  flex:1;
}
.map-stat-val{font-size:18px;font-weight:800;color:var(--accent);line-height:1;}
.map-stat-lbl{font-size:10px;color:var(--muted2);margin-top:2px;font-weight:500;}

/* roof legend card */
.roof-legend-card{
  background:var(--white);
  border:1px solid var(--border);
  border-radius:9px;
  padding:9px 14px;
  box-shadow:0 1px 4px rgba(0,0,0,.08);
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  flex:2.5;
}
.roof-lbl-head{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted2);margin-right:4px;}
.roof-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted);font-weight:500;}
.roof-pip{width:8px;height:8px;border-radius:50%;flex-shrink:0;border:1px solid rgba(0,0,0,.1);}

/* popup */
.leaflet-popup-content-wrapper{
  background:var(--white)!important;
  border:1px solid var(--border)!important;
  border-radius:10px!important;
  box-shadow:0 4px 20px rgba(0,0,0,.12)!important;
  padding:0!important;
}
.leaflet-popup-content{margin:0!important;width:230px!important;}
.leaflet-popup-tip{background:var(--white)!important;}
.pu-head{padding:12px 14px 10px;border-bottom:1px solid var(--border2);}
.pu-name{font-size:13px;font-weight:700;color:var(--text);}
.pu-dist{font-size:10px;color:var(--muted2);margin-top:2px;}
.pu-hvi-row{display:flex;align-items:center;gap:8px;margin-top:8px;}
.pu-bar-bg{flex:1;height:5px;background:var(--bg);border-radius:3px;overflow:hidden;}
.pu-bar-fill{height:100%;border-radius:3px;}
.pu-hvi-num{font-size:12px;font-weight:700;flex-shrink:0;}
.pu-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border2);}
.pu-cell{background:var(--white);padding:8px 12px;}
.pu-cell-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted2);font-weight:600;}
.pu-cell-val{font-size:13px;font-weight:600;margin-top:2px;color:var(--text);}
.pu-roof{padding:8px 12px;background:var(--surface);border-top:1px solid var(--border2);border-bottom-left-radius:10px;border-bottom-right-radius:10px;}
.pu-roof-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted2);font-weight:600;}
.pu-roof-val{font-size:11px;font-weight:500;margin-top:3px;color:var(--text);display:flex;align-items:center;gap:6px;}

/* leaflet overrides */
.leaflet-control-zoom{border:none!important;box-shadow:0 1px 4px rgba(0,0,0,.12)!important;}
.leaflet-control-zoom a{
  background:var(--white)!important;color:var(--text)!important;
  border:1px solid var(--border)!important;font-size:15px!important;
}
.leaflet-control-zoom a:hover{background:var(--bg)!important;}
.leaflet-control-attribution{background:rgba(255,255,255,.8)!important;color:var(--muted2)!important;font-size:9px!important;}
.leaflet-control-attribution a{color:var(--muted)!important;}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-brand">Delhi's <span>HeatShield</span></div>
  <div class="nav-links">
    <a class="nav-link active">Risk Map</a>
    <a class="nav-link">HVI Factors</a>
    <a class="nav-link">Search Location</a>
    <a class="nav-link">HVI Rating</a>
    <a class="nav-link">Alerts</a>
  </div>
  <div class="nav-right">
    <button class="btn-login">Log in</button>
    <button class="btn-signup">Sign up</button>
  </div>
</nav>

<!-- BODY -->
<div class="body">

  <!-- LEFT PANEL -->
  <div class="panel">

    <div class="panel-topbar">
      <div class="panel-title">
        <span class="live-dot"></span>
        Risk Map — 132 Localities
      </div>
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input class="search-input" id="search" placeholder="Search locality or district…" oninput="applyFilters()">
      </div>
    </div>

    <div class="filter-section">
      <div class="filter-label">Settlement Type</div>
      <div class="chips">
        <button class="chip active" data-t="all"         onclick="setType(this)">All</button>
        <button class="chip"        data-t="informal"    onclick="setType(this)">Informal</button>
        <button class="chip"        data-t="dense_urban" onclick="setType(this)">Dense Urban</button>
        <button class="chip"        data-t="planned"     onclick="setType(this)">Planned</button>
        <button class="chip"        data-t="affluent"    onclick="setType(this)">Affluent</button>
        <button class="chip"        data-t="industrial"  onclick="setType(this)">Industrial</button>
      </div>
    </div>

    <div class="legend-section">
      <div class="legend-label">HVI Scale</div>
      <div class="legend-bar"></div>
      <div class="legend-ticks"><span>Low</span><span>Moderate</span><span>Critical</span></div>
    </div>

    <div class="loc-list" id="loc-list"></div>

    <div class="panel-footer">
      <span><span id="srv-dot"></span><span id="showing">132 localities</span></span>
      <button class="refresh-small" onclick="refreshData()">↻ Refresh</button>
    </div>
  </div>

  <!-- MAP -->
  <div class="map-wrap">
    <div id="map"></div>

    <!-- info pill -->
    <div class="map-info-pill">
      <span class="pill-dot"></span>
      Live Heat Monitoring — Delhi NCR
    </div>

    <!-- layer toggle top-left -->
    <div class="map-controls">
      <button class="map-ctrl-btn" id="btn-street"    onclick="setLayer('street')">Street</button>
      <button class="map-ctrl-btn active" id="btn-satellite" onclick="setLayer('satellite')">Satellite</button>
      <button class="map-ctrl-btn" id="btn-hybrid"   onclick="setLayer('hybrid')">Hybrid</button>
    </div>

    <!-- stats strip -->
    <div class="map-stats">
      <div class="map-stat-card">
        <div class="map-stat-val" id="s-count">132</div>
        <div class="map-stat-lbl">Localities Monitored</div>
      </div>
      <div class="map-stat-card">
        <div class="map-stat-val" id="s-lst">—</div>
        <div class="map-stat-lbl">Max LST °C</div>
      </div>
      <div class="map-stat-card">
        <div class="map-stat-val" id="s-hvi">—</div>
        <div class="map-stat-lbl">Avg HVI Score</div>
      </div>
      <div class="roof-legend-card">
        <span class="roof-lbl-head">Roof</span>
        <div class="roof-item"><div class="roof-pip" style="background:#e74c3c"></div>Metal</div>
        <div class="roof-item"><div class="roof-pip" style="background:#e67e22"></div>Asbestos</div>
        <div class="roof-item"><div class="roof-pip" style="background:#9b59b6"></div>Tarpaulin</div>
        <div class="roof-item"><div class="roof-pip" style="background:#3498db"></div>RCC</div>
        <div class="roof-item"><div class="roof-pip" style="background:#27ae60"></div>Clay</div>
        <div class="roof-item"><div class="roof-pip" style="background:#1abc9c"></div>Green</div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ── Supabase config — replace these two values ────────────────────────────────
// ✅ Correct — plain JS strings
const SUPABASE_URL  = 'https://cdnujphfgwosnmbufols.supabase.co';      // your project URL
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNkbnVqcGhmZ3dvc25tYnVmb2xzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNzE3MTksImV4cCI6MjA4OTY0NzcxOX0.8dwSctRN7vU6Mi5IbvMXP9OAXEinU9TpnTx9P57j1IQ';  // your anon key
const TABLE_NAME    = 'hvi_localities';  // starts with eyJ...
// your table name in Supabase

const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ── Tile layers ───────────────────────────────────────────────────────────────
const TILES = {
  satellite: L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    {attribution:'Esri, Maxar, Earthstar Geographics',maxZoom:19}
  ),
  street: L.tileLayer(
    'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
    {attribution:'&copy; OSM &copy; CARTO',subdomains:'abcd',maxZoom:19}
  ),
  hybrid: L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    {attribution:'Esri',maxZoom:19}
  ),
};
const ROAD_OVERLAY = L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/rastertiles/voyager_only_labels/{z}/{x}/{y}{r}.png',
  {subdomains:'abcd',maxZoom:19,opacity:.85}
);

const map = L.map('map',{center:[28.64,77.19],zoom:11});
TILES.satellite.addTo(map);
let labelLayer=null;

function setLayer(type){
  document.querySelectorAll('.map-ctrl-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-'+type).classList.add('active');
  Object.values(TILES).forEach(t=>{if(map.hasLayer(t))map.removeLayer(t);});
  if(labelLayer&&map.hasLayer(labelLayer))map.removeLayer(labelLayer);
  TILES[type].addTo(map);
  if(type==='hybrid'){labelLayer=ROAD_OVERLAY;map.addLayer(labelLayer);}
}

// ── State ─────────────────────────────────────────────────────────────────────
let DATA=[],activeType='all',selName=null,markers={};

// ── Colors ────────────────────────────────────────────────────────────────────
function hviColor(v){
  const stops=[[0.09,[46,204,113]],[0.35,[241,196,15]],[0.55,[230,126,34]],[0.72,[231,76,60]],[0.89,[142,68,173]]];
  for(let i=0;i<stops.length-1;i++){
    const [v0,c0]=stops[i],[v1,c1]=stops[i+1];
    if(v<=v1){const t=(v-v0)/(v1-v0);return `rgb(${~~(c0[0]+t*(c1[0]-c0[0]))},${~~(c0[1]+t*(c1[1]-c0[1]))},${~~(c0[2]+t*(c1[2]-c0[2]))})`;}
  }
  return 'rgb(142,68,173)';
}
function roofColor(m){
  return {'Metal Sheet':'#e74c3c','Asbestos Sheet':'#e67e22','Tarpaulin/Plastic':'#9b59b6',
          'RCC Concrete':'#3498db','Clay Tiles':'#27ae60','Green Roof':'#1abc9c',
          'Glass/Polycarbonate':'#95a5a6'}[m]||'#7f8c8d';
}

// ── Data load ─────────────────────────────────────────────────────────────────
async function loadData(){
  const dot    = document.getElementById('srv-dot');
  const status = document.getElementById('showing');
  dot.style.background = '#f97316';
  status.textContent   = 'Loading…';

  // ── 1. Try Supabase ─────────────────────────────────────────────────────────
  if(SUPABASE_URL !== 'YOUR_SUPABASE_URL'){
    try{
      // Fetch all rows from the table, ordered by HVI descending
     const { data, error } = await sbClient
        .from(TABLE_NAME)
        .select('*')
        .order('HVI', { ascending: false });

      if(error) throw error;
      if(data && data.length > 0){
        DATA = data;
        dot.style.background = '#22c55e';
        dot.title = 'Connected to Supabase';
        renderAll();
        return;
      }
      // Table exists but is empty — show warning
      console.warn('[HVI] Supabase table is empty. Falling back to embedded data.');
      showBanner('warning', 'Supabase table is empty — showing embedded data');
    } catch(e){
      console.error('[HVI] Supabase error:', e.message);
      showBanner('error', 'Supabase error: ' + e.message + ' — using embedded data');
    }
  }

  // ── 2. Try local Python server (dev fallback) ───────────────────────────────
  

  // ── 3. Embedded fallback ────────────────────────────────────────────────────
  DATA = EMBEDDED;
  dot.style.background = '#f97316';
  dot.title = 'Using embedded data (no live source)';
  renderAll();
}

// ── Banner helper ─────────────────────────────────────────────────────────────
function showBanner(type, msg){
  let el = document.getElementById('hvi-banner');
  if(!el){
    el = document.createElement('div');
    el.id = 'hvi-banner';
    el.style.cssText = `
      position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
      padding:8px 18px;border-radius:8px;font-size:12px;font-weight:500;
      z-index:9999;box-shadow:0 2px 10px rgba(0,0,0,.15);
      font-family:Inter,sans-serif;max-width:420px;text-align:center;
    `;
    document.body.appendChild(el);
  }
  if(type === 'error'){
    el.style.background='#fef2f2'; el.style.color='#b91c1c';
    el.style.border='1px solid #fecaca';
  } else {
    el.style.background='#fffbeb'; el.style.color='#92400e';
    el.style.border='1px solid #fde68a';
  }
  el.textContent = msg;
  setTimeout(()=>{ if(el) el.remove(); }, 6000);
}

function refreshData(){
  Object.values(markers).forEach(m=>map.removeLayer(m));
  markers={};
  loadData();
}

// ── Markers ───────────────────────────────────────────────────────────────────
function renderAll(){
  Object.values(markers).forEach(m=>map.removeLayer(m));
  markers={};
  DATA.forEach(d=>{
    const hvi=+d.HVI,col=hviColor(hvi),rc=roofColor(d.dominant_roof_material);
    const pct=((hvi-.09)/(.89-.09)*100).toFixed(0);
    const m=L.circleMarker([+d.latitude,+d.longitude],{
      radius:5+hvi*11,fillColor:col,color:rc,
      weight:1.5,opacity:.9,fillOpacity:.75,
    });
    m.bindPopup(`
      <div class="pu-head">
        <div class="pu-name">${d.locality}</div>
        <div class="pu-dist">${d.district}</div>
        <div class="pu-hvi-row">
          <div class="pu-bar-bg"><div class="pu-bar-fill" style="width:${pct}%;background:${col}"></div></div>
          <div class="pu-hvi-num" style="color:${col}">HVI ${hvi.toFixed(3)}</div>
        </div>
      </div>
      <div class="pu-grid">
        <div class="pu-cell"><div class="pu-cell-lbl">LST</div><div class="pu-cell-val">${d.lst_celsius}°C</div></div>
        <div class="pu-cell"><div class="pu-cell-lbl">Air Temp</div><div class="pu-cell-val">${d.air_temp_celsius}°C</div></div>
        <div class="pu-cell"><div class="pu-cell-lbl">UHI</div><div class="pu-cell-val">+${d.urban_heat_intensity}°C</div></div>
        <div class="pu-cell"><div class="pu-cell-lbl">Green Cover</div><div class="pu-cell-val">${d.green_cover_pct}%</div></div>
        <div class="pu-cell"><div class="pu-cell-lbl">Pop Density</div><div class="pu-cell-val">${(+d.population_density_per_km2).toLocaleString()}/km²</div></div>
        <div class="pu-cell"><div class="pu-cell-lbl">Type</div><div class="pu-cell-val" style="font-size:10px;text-transform:capitalize">${d.locality_type}</div></div>
      </div>
      <div class="pu-roof">
        <div class="pu-roof-lbl">Dominant Roof Material</div>
        <div class="pu-roof-val"><span style="width:8px;height:8px;border-radius:50%;background:${rc};display:inline-block;flex-shrink:0"></span>${d.dominant_roof_material}</div>
      </div>
    `,{maxWidth:230,className:''});
    m.on('click',()=>selectLoc(d.locality));
    markers[d.locality]=m;
    m.addTo(map);
  });
  document.getElementById('s-count').textContent=DATA.length;
  document.getElementById('s-lst').textContent=Math.max(...DATA.map(d=>+d.lst_celsius)).toFixed(1);
  document.getElementById('s-hvi').textContent=(DATA.reduce((s,d)=>s+(+d.HVI),0)/DATA.length).toFixed(3);
  applyFilters();
}

// ── Filters ───────────────────────────────────────────────────────────────────
function applyFilters(){
  const q=document.getElementById('search').value.toLowerCase();
  const vis=DATA.filter(d=>{
    return (activeType==='all'||d.locality_type===activeType)&&
           (!q||d.locality.toLowerCase().includes(q)||d.district.toLowerCase().includes(q));
  });
  const vset=new Set(vis.map(d=>d.locality));
  DATA.forEach(d=>{
    const m=markers[d.locality];if(!m)return;
    m.setStyle(vset.has(d.locality)?{opacity:.9,fillOpacity:.75}:{opacity:.05,fillOpacity:.04});
  });
  buildList(vis);
  document.getElementById('s-count').textContent=vis.length;
}

function setType(btn){
  document.querySelectorAll('.chip').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');activeType=btn.dataset.t;applyFilters();
}

// ── Sidebar list ──────────────────────────────────────────────────────────────
function buildList(data){
  const sorted=[...data].sort((a,b)=>(+b.HVI)-(+a.HVI));
  const el=document.getElementById('loc-list');
  el.innerHTML='';
  if(!sorted.length){
    el.innerHTML='<div style="padding:24px 16px;text-align:center;color:#9b948c;font-size:12px;">No localities match</div>';
    return;
  }
  sorted.forEach((d,i)=>{
    const col=hviColor(+d.HVI);
    const row=document.createElement('div');
    row.className='loc-item'+(d.locality===selName?' sel':'');
    row.dataset.n=d.locality;
    row.innerHTML=`
      <span class="loc-rank">${i+1}</span>
      <div class="loc-dot" style="background:${col}"></div>
      <div class="loc-info">
        <div class="loc-name">${d.locality}</div>
        <div class="loc-dist">${d.district}</div>
      </div>
      <div class="loc-hvi" style="color:${col}">${(+d.HVI).toFixed(3)}</div>
    `;
    row.onclick=()=>{
      selectLoc(d.locality);
      map.flyTo([+d.latitude,+d.longitude],14,{duration:.7,easeLinearity:.3});
      setTimeout(()=>markers[d.locality]?.openPopup(),750);
    };
    el.appendChild(row);
  });
  document.getElementById('showing').textContent=`${sorted.length} localities`;
}

function selectLoc(name){
  selName=name;
  document.querySelectorAll('.loc-item').forEach(r=>r.classList.toggle('sel',r.dataset.n===name));
  document.querySelector(`.loc-item[data-n="${name}"]`)?.scrollIntoView({block:'nearest',behavior:'smooth'});
}
